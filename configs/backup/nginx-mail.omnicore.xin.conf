# mail.omnicore.xin - SSL Configuration with Domain-only Access

# HTTP to HTTPS redirect
server {
    listen 80;
    server_name mail.omnicore.xin;

    # Certbot challenge location
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server for mail.omnicore.xin
server {
    listen 443 ssl http2;
    server_name mail.omnicore.xin;

    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/mail.omnicore.xin/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mail.omnicore.xin/privkey.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Static assets - with long cache
    location /console/assets/ {
        alias /var/www/notifuse/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        gzip on;
        gzip_types text/javascript application/javascript text/css;
    }

    # Static files (images, fonts) - with long cache
    location ~ ^/console/(.*)\.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        alias /var/www/notifuse/$1.$2;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Frontend - SPA fallback for routes
    location /console/ {
        alias /var/www/notifuse/;
        try_files $uri $uri/ /index.html;
        
        # Enable gzip for HTML
        gzip on;
        gzip_types text/plain text/css application/json;
        gzip_min_length 1000;
    }
    
    # Redirect /console to /console/
    location = /console {
        return 302 /console/;
    }

    # Backend API
    location /api/ {
        proxy_pass http://localhost:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Config.js - disable caching to ensure fresh configuration
    location /config.js {
        proxy_pass http://localhost:8080/config.js;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Default redirect
    location / {
        return 302 /console/;
    }
}

# Default server for IP access (69.12.85.185) - Return 444 to close connection
# This allows the IP to be used for other projects
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;

    server_name _;

    # Self-signed certificate for default server
    ssl_certificate /etc/nginx/ssl/default.crt;
    ssl_certificate_key /etc/nginx/ssl/default.key;

    # Close connection immediately for direct IP access
    return 444;
}
